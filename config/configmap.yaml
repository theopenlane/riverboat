  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONWORKER_CONFIG_OPENLANEAPITOKEN: {{ .Values.riverboat.river.workers.organizationdeletionworker.config.openlaneapitoken }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONWORKER_CONFIG_RUNINTERVAL: {{ .Values.riverboat.river.workers.organizationdeletionworker.config.runinterval }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONWORKER_CONFIG_MAXDELETESPERRUN: {{ .Values.riverboat.river.workers.organizationdeletionworker.config.maxdeletesperrun }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONWORKER_CONFIG_ENABLED: {{ .Values.riverboat.river.workers.organizationdeletionworker.config.enabled }}
  RIVERBOAT_RIVER_TRUSTCENTERWORKERS_OPENLANECONFIG_OPENLANEAPIHOST: {{ .Values.riverboat.river.trustcenterworkers.openlaneconfig.openlaneapihost }}
  RIVERBOAT_RIVER_TRUSTCENTERWORKERS_OPENLANECONFIG_OPENLANEAPITOKEN: {{ .Values.riverboat.river.trustcenterworkers.openlaneconfig.openlaneapitoken }}
  RIVERBOAT_RIVER_DEFAULTMAXRETRIES: {{ .Values.riverboat.river.defaultmaxretries | default 10 }}
  RIVERBOAT_RIVER_METRICS_ENABLEMETRICS: {{ .Values.riverboat.river.metrics.enablemetrics | default false }}
  RIVERBOAT_RIVER_METRICS_METRICSDURATIONUNIT: {{ .Values.riverboat.river.metrics.metricsdurationunit | default "ms" }}
  RIVERBOAT_RIVER_METRICS_ENABLESEMANTICMETRICS: {{ .Values.riverboat.river.metrics.enablesemanticmetrics | default true }}
