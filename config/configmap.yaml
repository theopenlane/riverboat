  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_COMPANYADDRESS: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.companyaddress }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_CORPORATION: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.corporation }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_YEAR: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.year }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_FROMEMAIL: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.fromemail }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_SUPPORTEMAIL: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.supportemail }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_QUESTIONNAIREEMAIL: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.questionnaireemail }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_LOGOURL: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.logourl }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_URLS_ROOT: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.urls.root }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_URLS_PRODUCT: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.urls.product }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_URLS_DOCS: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.urls.docs }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_URLS_VERIFY: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.urls.verify }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_URLS_INVITE: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.urls.invite }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_URLS_RESET: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.urls.reset }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_URLS_VERIFYSUBSCRIBER: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.urls.verifysubscriber }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_URLS_VERIFYBILLING: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.urls.verifybilling }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_URLS_BILLING: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.urls.billing }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_URLS_QUESTIONNAIRE: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.urls.questionnaire }}
  RIVERBOAT_RIVER_WORKERS_ORGANIZATIONDELETIONREMINDERWORKER_CONFIG_EMAIL_CONFIG_TEMPLATESPATH: {{ .Values.riverboat.river.workers.organizationdeletionreminderworker.config.email.config.templatespath }}
